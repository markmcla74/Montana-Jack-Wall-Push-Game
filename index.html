<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="screen-orientation" content="landscape">
  <link rel="manifest" href="manifest.json">
  <title>Montana Jack Wall Push</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div id="startOverlay">
  <div id="menuContainer">




  <div class="rules-content">
      <h1>Montana Jack Wall Push</h1>
      <div class="selection-group">
        <p>Players:</p>
        <button id="btn1P" class="toggle-btn active">1 Player</button>
        <button id="btn2P" class="toggle-btn">2 Players</button>
      </div>

      <div class="selection-group">
        <p>Energy Available:</p>
        <button id="showEnergyBtn" class="toggle-btn active">Show</button>
        <button id="hideEnergyBtn" class="toggle-btn">Hide</button>
      </div>



 <button id="startGameBtn">START GAME</button>

</div>




  </div>
</div>

  <canvas id="gameCanvas"></canvas>
   <div id="rules">
   <h3>Energy System Rules</h3>
   <ul>
     <li><strong>Start:</strong> 3 energy units</li>
     <li><strong>Rest:</strong> +4 energy</li>
     <li><strong>Push:</strong> –1 energy</li>
     <li><strong>Super Push:</strong> –3 energy</li>
   </ul>
</div>
  <p id="status"></p>
  <script src="index.js"></script>
</body>
</html>
