<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="screen-orientation" content="landscape">
  <link rel="manifest" href="manifest.json">
  <title>Montana Jack Wall Push</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div id="startOverlay">
  <div id="menuContainer">




  <div class="overlay-content">
      <h1>Montana Jack Wall Push</h1>
      <div class="selection-group">
        <p>Players:</p>
        <button id="btn1P" class="toggle-btn active">1 Player</button>
        <button id="btn2P" class="toggle-btn">2 Players</button>
      </div>

      <div class="selection-group">
        <p>Available Energy:</p>
        <button id="showEnergyBtn" class="toggle-btn active">Show</button>
        <button id="hideEnergyBtn" class="toggle-btn">Hide</button>
      </div>



 <button id="startGameBtn">START GAME</button>

</div>




  </div>
</div>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <div id="gameDashboard">
    <div id="controlsP1" class="player-controls">
      <button class="game-btn p1-btn">PUSH (-1)</button>
      <button id="btn-super-p1" class="game-btn p1-btn">SUPER PUSH (-4)</button>
      <button class="game-btn p1-btn">REST (+2)</button>
    </div>

    <div id="centerUI">

    </div>

    <div id="controlsP2" class="player-controls">
      <button class="game-btn p2-btn">PUSH (-1)</button>
      <button id="btn-super-p2" class="game-btn p2-btn">SUPER PUSH (-4)</button>
      <button class="game-btn p2-btn">REST (+2)</button>
    </div>
  </div>
</div>



  <p id="status"></p>
  <script src="index.js"></script>
</body>
</html>
